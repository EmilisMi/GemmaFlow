<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowType Indicator</title>
    <style>
        :root {
            --bar-color: #ffffff;
            --bg-color: #000000;
            --accent-red: #ff3b30;
            --accent-blue: #007aff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 200px;
            height: 80px;
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* The Pill Container */
        .pill {
            background-color: var(--bg-color);
            height: 44px;
            padding: 0 24px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        body.recording .pill, body.transcribing .pill {
            transform: scale(1);
            opacity: 1;
        }

        /* Status Dot */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-red);
            margin-right: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 8px var(--accent-red);
        }

        body.recording .status-dot {
            opacity: 1;
            animation: pulse-red 1s infinite;
        }

        /* Waveform Bars */
        .waveform {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 32px;
        }

        .bar {
            width: 3px;
            height: 4px;
            background-color: var(--bar-color);
            border-radius: 1.5px;
            transition: transform 0.08s linear, opacity 0.08s linear;
            transform-origin: center;
            opacity: 0.4;
        }

        /* Transcribing state styling */
        body.transcribing .bar {
            background-color: var(--accent-blue);
            animation: transcribing-wave 1s ease-in-out infinite;
        }

        @keyframes transcribing-wave {
            0%, 100% { transform: scaleY(1); opacity: 0.3; }
            50% { transform: scaleY(4); opacity: 0.8; }
        }

        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
        }
    </style>
</head>
<body class="idle">
    <div class="pill">
        <div class="status-dot"></div>
        <div class="waveform">
            <!-- Bars generated by JS -->
        </div>
    </div>
    <script src="indicator.js"></script>
</body>
</html>
