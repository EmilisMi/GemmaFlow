<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowType Indicator</title>
    <style>
        :root {
            --recording-red: #ff3b30;
            --transcribing-blue: #007aff;
            --glow-opacity: 0.3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 72px;
            height: 72px;
            background: transparent;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .container {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            cursor: grab;
        }

        /* The Dot */
        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            position: relative;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.6);
            opacity: 0;
        }

        /* Pulsing Aura */
        .aura {
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            z-index: 5;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(8px);
        }

        /* States */
        body.recording .dot {
            opacity: 1;
            transform: scale(1);
            background-color: var(--recording-red);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
            animation: breathe 1.5s ease-in-out infinite;
        }

        body.recording .aura {
            opacity: 1;
            background-color: var(--recording-red);
            animation: expand-aura 1.5s ease-in-out infinite;
        }

        body.transcribing .dot {
            opacity: 1;
            transform: scale(1);
            background-color: var(--transcribing-blue);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
            animation: spin-wave 2s linear infinite;
            border-radius: 40%; /* Slightly squircle during transcribing */
        }

        body.transcribing .aura {
            opacity: 1;
            background-color: var(--transcribing-blue);
            filter: blur(12px);
            animation: expand-aura 1s ease-in-out infinite;
        }

        body.idle .dot {
            opacity: 0;
            transform: scale(0.4);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.2); }
        }

        @keyframes expand-aura {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.8); opacity: 0.1; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        @keyframes spin-wave {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.9); border-radius: 50%; }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body class="idle">
    <div class="container">
        <div class="aura"></div>
        <div class="dot"></div>
    </div>
    <script src="indicator.js"></script>
</body>
</html>
