<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowType Indicator</title>
    <style>
        :root {
            --bar-color: #ffffff;
            --bg-color: #000000;
            --accent-red: #ff3b30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 240px;
            height: 80px;
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* The Pill Container (Dynamic Island Style) */
        .pill {
            background-color: var(--bg-color);
            height: 44px;
            padding: 0 20px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: scale(0);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        body.recording .pill, body.transcribing .pill {
            transform: scale(1);
            opacity: 1;
        }

        /* Status Dot (Small red dot on the left) */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-red);
            margin-right: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        body.recording .status-dot {
            opacity: 1;
            animation: pulse-red 1.5s infinite;
        }

        /* Waveform Bars */
        .waveform {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 32px;
        }

        .bar {
            width: 4px;
            height: 4px;
            background-color: var(--bar-color);
            border-radius: 2px;
            transition: all 0.2s ease-in-out;
            opacity: 0.8;
        }

        /* Simulate voice activity */
        body.recording .bar {
            animation: wave 1.2s ease-in-out infinite;
        }

        /* Transcribing state */
        body.transcribing .bar {
            background-color: #007aff;
            animation: transcribing-pulse 0.8s ease-in-out infinite;
        }

        /* Randomizing initial states */
        .bar:nth-child(odd) { animation-duration: 0.8s; }
        .bar:nth-child(3n) { animation-duration: 1.5s; }
        .bar:nth-child(4n) { animation-duration: 1s; }

        .bar:nth-child(1)  { animation-delay: 0.1s; }
        .bar:nth-child(2)  { animation-delay: 0.3s; }
        .bar:nth-child(3)  { animation-delay: 0.2s; }
        .bar:nth-child(4)  { animation-delay: 0.5s; }
        .bar:nth-child(5)  { animation-delay: 0.1s; }
        .bar:nth-child(6)  { animation-delay: 0.4s; }
        .bar:nth-child(7)  { animation-delay: 0.2s; }
        .bar:nth-child(8)  { animation-delay: 0.6s; }
        .bar:nth-child(9)  { animation-delay: 0.3s; }
        .bar:nth-child(10) { animation-delay: 0.1s; }
        .bar:nth-child(11) { animation-delay: 0.4s; }
        .bar:nth-child(12) { animation-delay: 0.2s; }
        .bar:nth-child(13) { animation-delay: 0.5s; }
        .bar:nth-child(14) { animation-delay: 0.3s; }
        .bar:nth-child(15) { animation-delay: 0.6s; }
        .bar:nth-child(16) { animation-delay: 0.2s; }
        .bar:nth-child(17) { animation-delay: 0.4s; }
        .bar:nth-child(18) { animation-delay: 0.1s; }
        .bar:nth-child(19) { animation-delay: 0.5s; }
        .bar:nth-child(20) { animation-delay: 0.3s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); opacity: 0.4; }
            50% { transform: scaleY(6); opacity: 1; }
        }

        @keyframes transcribing-pulse {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(2.5); opacity: 1; }
        }

        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
        }
    </style>
</head>
<body class="idle">
    <div class="pill">
        <div class="status-dot"></div>
        <div class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>
    <script src="indicator.js"></script>
</body>
</html>
